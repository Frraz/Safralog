{% if attachments %}
<div class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-6 gap-2"
     data-attachments-list
     hx-get="{% url 'attachments:list' %}?object_type={{ request.GET.object_type }}&object_id={{ request.GET.object_id }}"
     hx-trigger="refresh"
     hx-swap="outerHTML">
  {% for attachment in attachments %}
    <div class="relative group aspect-square rounded-lg overflow-hidden border border-gray-200 dark:border-gray-800 bg-gray-100 dark:bg-gray-800">
      {% if attachment.is_image %}
        <img src="{{ attachment.thumbnail_url }}"
             class="w-full h-full object-cover cursor-pointer"
             loading="lazy"
             @click="$dispatch('open-lightbox', { url: '{{ attachment.file_url }}' })"
             alt="{{ attachment.original_filename }}" />
      {% else %}
        <a href="{{ attachment.file_url }}" target="_blank" rel="noopener"
           class="flex flex-col items-center justify-center w-full h-full gap-1 p-2">
          <svg class="w-6 h-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <span class="text-xs text-gray-500 text-center truncate w-full px-1">
            {{ attachment.original_filename|truncatechars:12 }}
          </span>
        </a>
      {% endif %}

      {# Botão remover — aparece no hover #}
      <button class="absolute top-1 right-1 w-5 h-5 bg-red-500 text-white rounded-full
                     hidden group-hover:flex items-center justify-center shadow-md"
              hx-delete="{% url 'attachments:delete' attachment.pk %}"
              hx-confirm="Remover este anexo?"
              hx-target="closest div.relative"
              hx-swap="outerHTML swap:0.2s"
              title="Remover">
        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  {% endfor %}
</div>
{% else %}
<p class="text-sm text-gray-400 py-4 text-center">Nenhum anexo ainda.</p>
{% endif %}
