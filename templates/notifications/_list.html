{% if notifications %}
  {% for n in notifications %}
    <div class="px-4 py-3 border-b border-gray-100 dark:border-gray-700 last:border-0 {% if not n.is_read %}bg-green-50 dark:bg-green-900/10{% endif %}">
      <p class="text-sm text-gray-800 dark:text-gray-200">{{ n.message }}</p>
      <p class="text-xs text-gray-400 mt-0.5">{{ n.created_at|timesince }} atrás</p>
    </div>
  {% endfor %}
{% else %}
  <div class="p-6 text-center text-sm text-gray-400">
    Nenhuma notificação.
  </div>
{% endif %}
