<form method="get"
  hx-get="{% url 'employees:list' %}"
  hx-target="#employees-table"
  hx-trigger="change from:select, input from:input delay:400ms"
  class="flex flex-wrap gap-3 items-end">

  <div class="flex-1 min-w-44">
    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Buscar</label>
    <div class="relative">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"
        fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input type="text" name="q" value="{{ request.GET.q }}" placeholder="Nome ou CPF..."
        class="w-full pl-9 pr-3 py-2 text-sm border border-slate-200 rounded-lg text-slate-800 placeholder-slate-300
               focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition">
    </div>
  </div>

  <div class="w-36">
    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Tipo</label>
    <select name="type"
      class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg text-slate-700 bg-white
             focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition">
      <option value="">Todos</option>
      {% for val, label in person_types %}
      <option value="{{ val }}" {% if request.GET.type == val %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="w-36">
    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Status</label>
    <select name="status"
      class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg text-slate-700 bg-white
             focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition">
      <option value="">Todos</option>
      <option value="active" {% if request.GET.status == 'active' %}selected{% endif %}>Ativo</option>
      <option value="inactive" {% if request.GET.status == 'inactive' %}selected{% endif %}>Inativo</option>
    </select>
  </div>

  <div class="flex gap-2">
    <button type="submit"
      class="px-4 py-2 bg-sky-500 hover:bg-sky-600 text-white text-sm font-semibold rounded-lg transition">
      Filtrar
    </button>
    {% if request.GET.q or request.GET.type or request.GET.status %}
    <a href="{% url 'employees:list' %}"
      class="px-4 py-2 bg-white border border-slate-200 text-slate-500 hover:text-slate-700 text-sm rounded-lg transition flex items-center">
      Limpar
    </a>
    {% endif %}
  </div>
</form>
