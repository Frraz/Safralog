<tr class="hover:bg-slate-50/60 transition group">
  <td class="px-4 py-3">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-full bg-gradient-to-br from-sky-400 to-indigo-400 flex items-center justify-center flex-shrink-0 shadow-sm">
        <span class="text-xs font-bold text-white">{{ person.name|first|upper }}</span>
      </div>
      <div class="min-w-0">
        <a href="{% url 'employees:detail' person.pk %}"
          class="font-semibold text-slate-900 hover:text-sky-600 transition block truncate">
          {{ person.name }}
        </a>
        <p class="text-xs text-slate-400 sm:hidden">{{ person.cpf }}</p>
      </div>
    </div>
  </td>
  <td class="px-4 py-3 text-slate-500 text-xs font-mono hidden sm:table-cell">{{ person.cpf }}</td>
  <td class="px-4 py-3 hidden md:table-cell">
    <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold
      {% if person.is_employee %}bg-sky-50 text-sky-700 border border-sky-200
      {% else %}bg-violet-50 text-violet-700 border border-violet-200{% endif %}">
      {{ person.get_person_type_display }}
    </span>
  </td>
  <td class="px-4 py-3 text-slate-500 text-sm hidden lg:table-cell">{{ person.farm.name|default:"—" }}</td>
  <td class="px-4 py-3 text-slate-500 text-sm hidden lg:table-cell">{{ person.job_role.name|default:"—" }}</td>
  <td class="px-4 py-3 text-center">
    {% if person.is_active %}
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-700 border border-emerald-200">
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>Ativo
    </span>
    {% else %}
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-slate-100 text-slate-500 border border-slate-200">
      <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span>Inativo
    </span>
    {% endif %}
  </td>
  <td class="px-4 py-3 text-right">
    <div class="flex items-center gap-1 justify-end opacity-0 group-hover:opacity-100 transition">
      <a href="{% url 'employees:detail' person.pk %}"
        class="p-1.5 text-slate-400 hover:text-sky-600 rounded-lg hover:bg-sky-50 transition" title="Ver">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
      </a>
      <a href="{% url 'employees:update' person.pk %}"
        class="p-1.5 text-slate-400 hover:text-amber-600 rounded-lg hover:bg-amber-50 transition" title="Editar">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
        </svg>
      </a>
    </div>
  </td>
</tr>
