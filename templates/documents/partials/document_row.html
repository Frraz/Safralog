<tr class="hover:bg-slate-50/60 transition group">
  <td class="px-4 py-3 font-semibold text-slate-900">{{ doc.person.name }}</td>
  <td class="px-4 py-3 text-slate-500 hidden sm:table-cell">{{ doc.document_type.name }}</td>
  <td class="px-4 py-3 text-center">
    {% if doc.status == 'valid' %}
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-700 border border-emerald-200">
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>Válido
    </span>
    {% elif doc.status == 'expiring' %}
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-amber-50 text-amber-700 border border-amber-200">
      <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>Vencendo
    </span>
    {% else %}
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-red-50 text-red-700 border border-red-200">
      <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>Vencido
    </span>
    {% endif %}
  </td>
  <td class="px-4 py-3 text-slate-500 hidden md:table-cell">
    {{ doc.expiry_date|date:"d/m/Y"|default:"—" }}
  </td>
  <td class="px-4 py-3 text-right">
    <div class="flex items-center gap-1 justify-end opacity-0 group-hover:opacity-100 transition">
      {% if doc.file %}
      <a href="{{ doc.file.url }}" target="_blank"
        class="p-1.5 text-slate-400 hover:text-sky-600 rounded-lg hover:bg-sky-50 transition">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
      </a>
      {% endif %}
      <form method="post" action="{% url 'documents:delete' doc.pk %}"
        onsubmit="return confirm('Remover este documento?')">
        {% csrf_token %}
        <button type="submit" class="p-1.5 text-slate-300 hover:text-red-500 rounded-lg hover:bg-red-50 transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </form>
    </div>
  </td>
</tr>
