{% comment %}
Uso: {% include "components/badge.html" with label="Ativo" color="emerald" %}
Cores: emerald (verde), red (vermelho), amber (amarelo), sky (azul), violet (roxo), slate (cinza)
{% endcomment %}
<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-semibold
  {% if color == 'emerald' %}bg-emerald-50 text-emerald-700 border border-emerald-200 dark:bg-emerald-900/20 dark:text-emerald-400 dark:border-emerald-800
  {% elif color == 'red' %}bg-red-50 text-red-700 border border-red-200 dark:bg-red-900/20 dark:text-red-400 dark:border-red-800
  {% elif color == 'amber' %}bg-amber-50 text-amber-700 border border-amber-200 dark:bg-amber-900/20 dark:text-amber-400 dark:border-amber-800
  {% elif color == 'violet' %}bg-violet-50 text-violet-700 border border-violet-200 dark:bg-violet-900/20 dark:text-violet-400 dark:border-violet-800
  {% elif color == 'sky' %}bg-sky-50 text-sky-700 border border-sky-200 dark:bg-sky-900/20 dark:text-sky-400 dark:border-sky-800
  {% else %}bg-slate-100 text-slate-600 border border-slate-200 dark:bg-gray-800 dark:text-gray-400 dark:border-gray-700{% endif %}">
  {% if dot %}
  <span class="w-1.5 h-1.5 rounded-full mr-1.5
    {% if color == 'emerald' %}bg-emerald-500 dark:bg-emerald-400
    {% elif color == 'red' %}bg-red-500 dark:bg-red-400
    {% elif color == 'amber' %}bg-amber-500 dark:bg-amber-400
    {% elif color == 'violet' %}bg-violet-500 dark:bg-violet-400
    {% elif color == 'sky' %}bg-sky-500 dark:bg-sky-400
    {% else %}bg-slate-400 dark:bg-gray-500{% endif %}"></span>
  {% endif %}
  {{ label }}
</span>
