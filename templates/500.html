<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    p { font-size: 0.875rem; color: #64748b; line-height: 1.6; }
    a { display: inline-block; margin-top: 24px; padding: 10px 24px;
        background: #0ea5e9; color: #fff; border-radius: 8px; text-decoration: none;
        font-size: 0.875rem; font-weight: 600; }
    a:hover { background: #0284c7; }
    code { font-size: 0.7rem; color: #94a3b8; display: block; margin-top: 16px; }
