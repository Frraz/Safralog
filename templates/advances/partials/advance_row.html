<tr class="hover:bg-slate-50/60 transition group">
  <td class="px-4 py-3 font-semibold text-slate-900">{{ adv.person.name }}</td>
  <td class="px-4 py-3 text-right font-bold text-slate-800">
    R$ {{ adv.requested_value|floatformat:2 }}
  </td>
  <td class="px-4 py-3 text-center">
    {% if adv.status == 'pending' %}
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-amber-50 text-amber-700 border border-amber-200">
      <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>Pendente
    </span>
    {% elif adv.status == 'approved' %}
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-700 border border-emerald-200">
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>Aprovado
    </span>
    {% elif adv.status == 'rejected' %}
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-red-50 text-red-700 border border-red-200">
      <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>Rejeitado
    </span>
    {% else %}
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-slate-100 text-slate-500 border border-slate-200">
      <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span>Descontado
    </span>
    {% endif %}
  </td>
  <td class="px-4 py-3 text-slate-500 hidden md:table-cell">
    {{ adv.request_date|date:"d/m/Y" }}
  </td>
  <td class="px-4 py-3 text-right">
    <a href="{% url 'advances:detail' adv.pk %}"
      class="text-xs font-semibold text-sky-600 hover:text-sky-800 transition opacity-0 group-hover:opacity-100">
      Ver detalhes →
    </a>
  </td>
</tr>
