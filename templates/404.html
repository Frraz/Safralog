<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Sistema RH</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; padding: 24px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
            padding: 40px; max-width: 420px; width: 100%; text-align: center; }
    .code { font-size: 4rem; font-weight: 800; color: #e2e8f0; line-height: 1; margin-bottom: 16px; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 0.875rem; color: #64748b; }
    a { display: inline-block; margin-top: 24px; padding: 10px 24px;
        background: #0ea5e9; color: #fff; border-radius: 8px; text-decoration: none;
        font-size: 0.875rem; font-weight: 600; }
    a:hover { background: #0284c7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>A página que você buscou não existe ou foi movida.</p>
    <a href="/">Voltar ao início</a>
  </div>
</body>
</html>
