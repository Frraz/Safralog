{% if messages %}
<div id="messages-container" class="space-y-2 mb-5">
  {% for message in messages %}
  <div
    role="alert"
    data-message
    data-timeout="5000"
    class="flex items-start gap-3 px-4 py-3 rounded-xl border text-sm
      {% if message.tags == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-800
      {% elif message.tags == 'error' or message.tags == 'danger' %}bg-red-50 border-red-200 text-red-800
      {% elif message.tags == 'warning' %}bg-amber-50 border-amber-200 text-amber-800
      {% else %}bg-sky-50 border-sky-200 text-sky-800{% endif %}"
  >
    <div class="flex-shrink-0 mt-0.5">
      {% if message.tags == 'success' %}
      <svg class="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
      </svg>
      {% elif message.tags == 'error' or message.tags == 'danger' %}
      <svg class="w-4 h-4 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
      {% elif message.tags == 'warning' %}
      <svg class="w-4 h-4 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
      {% else %}
      <svg class="w-4 h-4 text-sky-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      {% endif %}
    </div>
    <p class="flex-1 leading-snug">{{ message }}</p>
    <button type="button" onclick="this.closest('[data-message]').remove()"
      class="flex-shrink-0 mt-0.5 opacity-50 hover:opacity-100 transition rounded focus:outline-none focus:ring-1 focus:ring-current"
      aria-label="Fechar">
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  {% endfor %}
</div>
<script>
  document.querySelectorAll('[data-message]').forEach(function(el) {
    var t = parseInt(el.dataset.timeout || '5000', 10);
    setTimeout(function() {
      if (!el.isConnected) return;
      el.style.transition = 'opacity 0.4s ease';
      el.style.opacity = '0';
      setTimeout(function() { el.remove(); }, 400);
    }, t);
  });
</script>
{% endif %}
