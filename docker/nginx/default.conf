# =============================================================================
# SafraLog — docker/nginx/default.conf
# =============================================================================
upstream django_app {
    server django:8000;
    keepalive 32;
}

# Redirect HTTP → HTTPS (produção)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;  # descomente em produção
    server_name _;

    # SSL (descomente em produção)
    # ssl_certificate /etc/letsencrypt/live/safralog.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/safralog.com.br/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Arquivos estáticos — servidos diretamente pelo Nginx
    location /static/ {
        alias /app/static_collected/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media — servidos pelo Nginx
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Rate limiting para login
    location /accounts/login/ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://django_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Proxy para Django
    location / {
        proxy_pass http://django_app;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # Healthcheck
    location /health/ {
        proxy_pass http://django_app;
        access_log off;
    }

    # Favicon
    location = /favicon.ico {
        alias /app/static_collected/img/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # Robots
    location = /robots.txt {
        alias /app/static_collected/robots.txt;
        access_log off;
    }
}
