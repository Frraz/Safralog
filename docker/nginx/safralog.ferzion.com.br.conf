# =============================================================================
# SafraLog — Nginx config para o HOST do VPS Hostinger
#
# Instalar em: /etc/nginx/sites-available/safralog.ferzion.com.br
# Ativar com: sudo ln -s /etc/nginx/sites-available/safralog.ferzion.com.br \
#                        /etc/nginx/sites-enabled/safralog.ferzion.com.br
# Testar: sudo nginx -t && sudo systemctl reload nginx
#
# Antes de ativar HTTPS, obtenha o certificado:
#   sudo certbot certonly --nginx -d safralog.ferzion.com.br
# =============================================================================

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name safralog.ferzion.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name safralog.ferzion.com.br;

    # Certificado SSL (gerado pelo certbot)
    ssl_certificate /etc/letsencrypt/live/safralog.ferzion.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safralog.ferzion.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Tamanho máximo de upload (WhatsApp images, PDFs)
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Cabeçalhos de segurança
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Arquivos estáticos — servidos diretamente (cache agressivo)
    location /static/ {
        alias /var/www/docker-instances/SafraLog/static_collected/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Arquivos de mídia (romaneios, comprovantes, fotos)
    location /media/ {
        alias /var/www/docker-instances/SafraLog/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Rate limiting para login
    location /accounts/login/ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://127.0.0.1:8120;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy para o Gunicorn (Django) na porta interna 8120
    location / {
        proxy_pass http://127.0.0.1:8120;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # Health check (sem log)
    location /health/ {
        proxy_pass http://127.0.0.1:8120;
        access_log off;
        proxy_set_header Host $host;
    }

    # Favicon
    location = /favicon.ico {
        alias /var/www/docker-instances/SafraLog/static_collected/img/favicon.ico;
        access_log off;
        log_not_found off;
    }

    # Logs
    access_log /var/log/nginx/safralog.access.log;
    error_log /var/log/nginx/safralog.error.log warn;
}
